name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./scripts/package.sh "$VERSION"

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_FILE="build/Ongeul-${VERSION}.pkg"
          SHA256=$(shasum -a 256 "$PKG_FILE" | awk '{print $1}')
          NOTES=$(gh api repos/$GITHUB_REPOSITORY/releases/generate-notes \
            -f tag_name="$GITHUB_REF_NAME" --jq '.body')
          DOCS_VERSION="${VERSION%%-*}"
          DOCS_URL="https://hiking90.github.io/ongeul/${DOCS_VERSION}/user/installation.html"
          FOOTER=$(printf '\n\n---\n📖 [설치 가이드](%s)\n**SHA-256:** `%s`\nVerify: `shasum -a 256 Ongeul-%s.pkg`' "$DOCS_URL" "$SHA256" "$VERSION")
          gh release create "$GITHUB_REF_NAME" \
            "$PKG_FILE" \
            --title "Ongeul ${VERSION}" \
            --notes "${NOTES}${FOOTER}"

  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: config
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Strip pre-release suffix (e.g. 0.2.0-rc3 → 0.2.0)
          VERSION="${VERSION%%-*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install mdBook
        run: |
          MDBOOK_VERSION="0.4.40"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Build documentation
        run: mdbook build docs/

      - name: Assemble versioned site
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          mkdir -p build/site

          # Restore existing docs from gh-pages branch
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            # Only restore known files: versions.json, index.html, dev/, and version directories
            git show origin/gh-pages:versions.json > build/site/versions.json 2>/dev/null || true
            git show origin/gh-pages:index.html > build/site/index.html 2>/dev/null || true
            git archive origin/gh-pages dev | tar -x -C build/site 2>/dev/null || true
            if [[ -f build/site/versions.json ]]; then
              for v in $(jq -r '.[]' build/site/versions.json); do
                git archive origin/gh-pages "$v" | tar -x -C build/site 2>/dev/null || true
              done
            fi
          fi

          # Add versioned docs
          rm -rf "build/site/${VERSION}"
          mkdir -p "build/site/${VERSION}"
          cp -r build/book/* "build/site/${VERSION}/"

          # Update versions.json
          EXISTING='[]'
          if [[ -f build/site/versions.json ]]; then
            EXISTING=$(cat build/site/versions.json)
          fi
          UPDATED=$(echo "$EXISTING" | jq --arg v "$VERSION" \
            '([$v] + .) | unique | sort_by(split(".") | map(tonumber)) | reverse')
          echo "$UPDATED" > build/site/versions.json

          # Update root redirect
          cp docs/theme/redirect-index.html build/site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Update version storage
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/site
