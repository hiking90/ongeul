name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          MDBOOK_VERSION="0.4.40"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Build documentation
        run: mdbook build docs/

      - name: Assemble site
        run: |
          mkdir -p build/site

          # Restore versioned docs from gh-pages branch
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            # Only restore known files: versions.json, index.html, and version directories
            # Note: avoid `git show ... > file || true` as the redirect creates an empty file even on failure
            git show origin/gh-pages:versions.json > /tmp/versions.json 2>/dev/null && mv /tmp/versions.json build/site/versions.json || true
            git show origin/gh-pages:index.html > /tmp/index.html 2>/dev/null && mv /tmp/index.html build/site/index.html || true
            if [[ -f build/site/versions.json ]] && jq empty build/site/versions.json 2>/dev/null; then
              for v in $(jq -r '.[]' build/site/versions.json); do
                git archive origin/gh-pages "$v" | tar -x -C build/site 2>/dev/null || true
              done
            fi
          fi

          # Update dev docs
          rm -rf build/site/dev
          cp -r build/book build/site/dev

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Update version storage
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/site
